name: Keep Alive

on:
  schedule:
    - cron: "*/10 * * * *"  # every 10 minutes

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://calendar-matcher.onrender.com)
          echo "Status: $STATUS"
          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 500 ]; then
            echo "Unexpected status $STATUS"
            exit 1
          fi
